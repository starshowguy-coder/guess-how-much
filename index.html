<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guess How Much — 原型</title>
<style>
  :root{--bg:#0f1620;--panel:#18222e;--panel2:#1f2c3a;--line:#2c3b4d;--txt:#e6edf3;--mut:#8aa0b4;--gold:#f2c14e;--good:#4caf6e;--bad:#e25c5c;--acc:#3a86c8}
  *{box-sizing:border-box}
  body{margin:0;font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  .wrap{max-width:1080px;margin:0 auto;padding:14px}
  h1{font-size:18px;margin:0 0 2px} .sub{color:var(--mut);font-size:12px;margin-bottom:10px}
  .players{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
  .pl{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .pl.turn{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .pl.out{opacity:.4}
  .pl .nm{font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .pl .cash{color:var(--gold);font-variant-numeric:tabular-nums;font-size:15px}
  .pl .tag{font-size:11px;color:var(--mut)}
  .pl .bidding{font-size:11px;color:var(--gold)}
  .bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-bottom:10px}
  .bar b{color:var(--gold)} .bar .x{color:var(--mut)}
  .grid{display:flex;flex-wrap:wrap;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;min-height:120px;margin-bottom:10px}
  .item{position:relative;border-radius:8px;border:2px solid #44566a;background:#0c131c;padding:8px;min-height:74px;display:flex;flex-direction:column;justify-content:space-between;cursor:default;transition:background .3s,border-color .3s}
  .item .sz{font-size:18px;font-weight:800}
  .item .nm{font-size:11px;line-height:1.2}
  .item .vl{font-size:12px;color:var(--gold);font-variant-numeric:tabular-nums}
  .item .peek{position:absolute;top:-9px;right:-6px;display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end;max-width:90px}
  .badge{font-size:10px;background:#2b3a4c;border:1px solid var(--line);border-radius:8px;padding:0 5px;color:var(--mut)}
  .badge.you{color:var(--gold);border-color:var(--gold)}
  .opening{border-color:var(--gold)!important;box-shadow:0 0 14px rgba(242,193,78,.4)}
  .spinner{width:30px;height:30px;border:3px solid #36475a;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:6px auto 2px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .justrevealed{animation:pop .35s ease}
  @keyframes pop{0%{transform:scale(.7);opacity:.3}100%{transform:scale(1);opacity:1}}
  .targeting .item{cursor:pointer} .targeting .item:hover{outline:2px solid var(--gold)}
  .panel{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;min-height:64px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:4px 0}
  button{background:var(--acc);color:#fff;border:0;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;font-weight:600}
  button.alt{background:#34465a} button.warn{background:#7a4a2a} button.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  button:disabled{opacity:.4;cursor:not-allowed}
  input{background:#0c131c;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px;width:120px;font-size:14px}
  .clock{display:inline-block;min-width:34px;text-align:center;font-variant-numeric:tabular-nums;color:var(--gold);font-weight:700}
  .log{background:#0c131c;border:1px solid var(--line);border-radius:10px;padding:10px;height:170px;overflow:auto;font-size:12px;line-height:1.5}
  .log div{padding:1px 0;border-bottom:1px solid #16202b}
  .muted{color:var(--mut)} .g{color:var(--good)} .b{color:var(--bad)} .y{color:var(--gold)}
  .hint{color:var(--mut);font-size:12px;margin:4px 0}
  details{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-bottom:10px}
  table{border-collapse:collapse;width:100%;font-size:12px;margin-top:6px}
  th,td{border:1px solid var(--line);padding:3px 6px;text-align:center} th{color:var(--mut)}
  .ob-overlay{position:fixed;inset:0;background:rgba(5,9,14,.82);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
  .ob-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:460px;width:100%;padding:24px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .ob-step{color:var(--gold);font-size:12px;font-weight:700;letter-spacing:1px}
  .ob-card h2{margin:6px 0 12px;font-size:21px}
  .ob-card .body{font-size:13.5px;line-height:1.75}
  .ob-card .body b{color:var(--gold)} .ob-card .body .em{color:#ffd877}
  .ob-dots{display:flex;gap:7px;justify-content:center;margin:18px 0}
  .ob-dot{width:8px;height:8px;border-radius:50%;background:#3a4a5c}
  .ob-dot.on{background:var(--gold)}
  .ob-btns{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .reopen{float:right;font-size:12px;padding:5px 10px}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="ob-overlay hidden" id="onboard"><div class="ob-card">
  <div class="ob-step" id="ob-step"></div>
  <h2 id="ob-title"></h2>
  <div class="body" id="ob-body"></div>
  <div class="ob-dots" id="ob-dots"></div>
  <div class="ob-btns">
    <button class="ghost" onclick="obClose()">跳过</button>
    <div class="row" style="margin:0">
      <button class="ghost hidden" id="ob-prev" onclick="obPrev()">上一步</button>
      <button id="ob-next" onclick="obNext()">下一步</button>
    </div>
  </div>
</div></div>
<div class="wrap">
  <button class="ghost reopen" onclick="showOnboard()">玩法说明</button>
  <h1>Guess How Much — 可玩原型</h1>
  <div class="sub">你 vs 3 名 AI 收藏家。盲拍集装箱，3 轮递增竞价；每人轮到时先（可选）偷看一件、再出价。开箱揭晓，缴阶梯税，现金归零淘汰。</div>
  <div class="players" id="players"></div>
  <div class="bar" id="bar"></div>
  <div class="grid" id="grid"></div>
  <div class="panel" id="action"></div>
  <details><summary>paybook（点开查看价值表与概率）</summary><div id="paybook"></div></details>
  <div class="log" id="log"></div>
</div>
<script>
"use strict";
const SIZES=[1,2,4,6], SIZEW=[.35,.30,.22,.13];
const COLNAME=['白','蓝','紫','橙','红'];
const COLHEX=['#cfd6dd','#4a90d9','#9b59b6','#e67e22','#e74c3c'];
const VAL=[ [5,150,1200,6000,120000], [20,350,2500,12000,45000], [50,800,5000,24000,65000], [100,1500,8000,36000,85000] ];
const PROB=[ [.22,.47,.20,.095,.015], [.24,.40,.23,.10,.03], [.25,.35,.26,.11,.03], [.25,.32,.28,.12,.03] ];
const NAMES=[
 ['女儿的涂鸦','银质怀表','帝王绿翡翠戒','拿破仑的怀表','★非洲之心钻石'],
 ['旧报纸合订本','古董座钟','法贝热彩蛋','大明宣德炉','蒙娜丽莎手稿'],
 ['宜家装饰画','海洋之心项链','毕加索遗作','敦煌经卷','失落的帝国王冠'],
 ['二手沙发','文艺复兴挂毯','商周青铜鼎','圆明园兽首','图坦卡蒙黄金面具'] ];
const EV=VAL.map((row,si)=>row.reduce((a,v,c)=>a+v*PROB[si][c],0));
const OPENING=1000, BOXCAP=25;
const TURN_TIME=25000;           // 每人回合倒计时（毫秒，所有人相同），可调
const AI_THINK_MIN=3000, AI_THINK_MAX=8000; // AI 模拟思考时长（在回合倒计时内出手），可调
function taxFor(b){return b<=5?2000:b<=10?6000:b<=15?15000:b<=20?35000:70000;}
function fmt(n){return Math.round(n).toLocaleString();}
function rnd(a,b){return a+Math.random()*(b-a);}
function wpick(w){let r=Math.random(),s=0;for(let i=0;i<w.length;i++){s+=w[i];if(r<s)return i;}return w.length-1;}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let players, box, container, round, order, turnPos, currentHigh, highBidder, phase, targetMode, lastWinnerInfo, countdownEnd, revealIdx, turnPeeked;
let tickT=null, actT=null;
function clearTimers(){if(tickT){clearInterval(tickT);tickT=null;}if(actT){clearTimeout(actT);actT=null;}}

function newGame(){
  clearTimers();
  players=[
    {name:'你',human:true,cash:300000,alive:true},
    {name:'苏菲',human:false,cash:300000,alive:true,risk:.88,jump:.35},
    {name:'伊森',human:false,cash:300000,alive:true,risk:.74,jump:.2},
    {name:'维克托',human:false,cash:300000,alive:true,risk:.62,jump:.12},
  ];
  box=0; lastWinnerInfo=null; log('— 新游戏开始，每人 300,000 —','y'); startContainer();
}
function alive(){return players.map((p,i)=>i).filter(i=>players[i].alive);}

function startContainer(){
  clearTimers(); box++;
  const n=9+Math.floor(Math.random()*5); container=[]; // 每箱 9–13 件，均匀随机（见 D003）
  for(let i=0;i<n;i++){const si=wpick(SIZEW);const ci=wpick(PROB[si]);
    container.push({si,ci,cells:SIZES[si],value:VAL[si][ci],name:NAMES[si][ci],knownBy:new Set(),peeks:[],revealed:false,opening:false});}
  currentHigh=0; highBidder=null; round=1; order=shuffle(alive());
  log(`▶ 第 ${box} 箱上台（${n} 件，本箱税 ${fmt(taxFor(box))}）。投骰定序：${order.map(i=>players[i].name).join(' → ')}`,'y');
  beginRound();
}
function beginRound(){turnPos=0;phase='bid';beginTurn();}
function endRound(){
  if(round<3){round++;
    if(highBidder!=null){const o=alive().filter(i=>i!==highBidder);o.push(highBidder);order=o;}
    else order=alive();
    log(`— 第 ${round} 轮，顺序：${order.map(i=>players[i].name).join(' → ')}${highBidder!=null?'（'+players[highBidder].name+'收尾）':''} —`);
    beginRound();
  } else settle();
}

function beginTurn(){
  clearTimers();
  if(turnPos>=order.length){endRound();return;}
  const pi=order[turnPos];
  if(!players[pi].alive){turnPos++;return beginTurn();}
  phase='bid'; turnPeeked=false; targetMode=null;
  countdownEnd=Date.now()+TURN_TIME;
  tickT=setInterval(()=>{
    const c=document.getElementById('clock'); if(c)c.textContent=secsLeft()+'s';
    if(players[pi].human && Date.now()>=countdownEnd){clearTimers();pass(0);log('你：超时，自动过','muted');turnPos++;render();actT=setTimeout(beginTurn,400);}
  },250);
  if(!players[pi].human){
    const think=Math.min(rnd(AI_THINK_MIN,AI_THINK_MAX),TURN_TIME-500);
    actT=setTimeout(()=>{clearTimers();aiPeek(pi);aiBid(pi);turnPos++;render();actT=setTimeout(beginTurn,600);},think);
  }
  render();
}

// ---- AI ----
function estimate(pi){let s=0;for(const it of container)s+=it.knownBy.has(pi)?it.value:EV[it.si];return s*rnd(.9,1.1);}
function aiPeek(pi){
  let cand=container.filter(it=>!it.knownBy.has(pi)); if(!cand.length)return;
  let ones=cand.filter(it=>it.cells===1);
  let t=ones.length?ones[Math.floor(Math.random()*ones.length)]:cand.sort((a,b)=>b.cells-a.cells)[0];
  t.knownBy.add(pi); t.peeks.push({pi,round});
  log(`${players[pi].name} 偷看了「${t.cells}格」的一件（第${round}轮）`,'muted');
}
function aiBid(pi){
  const p=players[pi]; const est=estimate(pi); const reserve=taxFor(box);
  let maxBid=Math.min(est*p.risk, p.cash-reserve);
  if(currentHigh===0){ if(maxBid>=OPENING)raise(pi,OPENING); else pass(pi); }
  else{ const need=currentHigh+minRaise();
    if(need<=maxBid && p.cash>=need){ let bid=need;
      if(Math.random()<p.jump){bid=Math.max(need,Math.round((need+(maxBid-need)*Math.random())/100)*100);}
      raise(pi,bid);
    } else pass(pi); }
}
function minRaise(){return Math.max(100,Math.ceil(currentHigh*0.05/100)*100);}
function raise(pi,amt){currentHigh=amt;highBidder=pi;log(`${players[pi].name} 出价 ${fmt(amt)}`,'g');}
function pass(pi){log(`${players[pi].name} 过`,'muted');}

// ---- 玩家：先偷看（可选）再出价 ----
function startPeek(){if(phase!=='bid'||turnPos>=order.length||order[turnPos]!==0||turnPeeked)return;targetMode='peek';render();}
function pickTarget(idx){
  if(targetMode!=='peek'||phase!=='bid'||turnPos>=order.length||order[turnPos]!==0||turnPeeked)return;
  const it=container[idx];
  if(it.knownBy.has(0)){return;}
  it.knownBy.add(0); it.peeks.push({pi:0,round}); turnPeeked=true; targetMode=null;
  log(`你偷看了第 ${idx+1} 件「${it.cells}格」→ ${it.name}（${fmt(it.value)}），第${round}轮`,'y');
  render();
}
function humanRaise(){
  if(phase!=='bid'||turnPos>=order.length||order[turnPos]!==0)return;
  const inp=document.getElementById('bidamt'); let amt=parseInt((inp.value||'').replace(/[^0-9]/g,''),10);
  const need=currentHigh===0?OPENING:currentHigh+minRaise();
  if(isNaN(amt)){alert('请输入金额');return;}
  if(amt<need){alert('至少要 '+fmt(need));return;}
  if(amt>players[0].cash){alert('现金不足');return;}
  clearTimers(); raise(0,amt); turnPos++; render(); actT=setTimeout(beginTurn,300);
}
function humanPass(){
  if(phase!=='bid'||turnPos>=order.length||order[turnPos]!==0)return;
  clearTimers(); pass(0); turnPos++; render(); actT=setTimeout(beginTurn,300);
}

// ---- 开箱揭晓 ----
function settle(){
  clearTimers(); phase='reveal'; revealIdx=0;
  container.forEach(it=>{it.revealed=false;it.opening=false;});
  log('🔓 开箱揭晓…','y'); render(); revealNext();
}
function revealNext(){
  if(revealIdx>=container.length){finishSettle();return;}
  const it=container[revealIdx]; it.opening=true; render();
  const dur=500+Math.min(3000,it.value/40);
  actT=setTimeout(()=>{
    it.opening=false; it.revealed=true; it.just=true;
    log(`第 ${revealIdx+1} 件：${it.cells}格 → ${it.name}（${fmt(it.value)}）`, it.ci>=3?'y':'muted');
    render(); it.just=false; revealIdx++; actT=setTimeout(revealNext,300);
  },dur);
}
function finishSettle(){
  const total=container.reduce((a,it)=>a+it.value,0);
  if(highBidder==null){lastWinnerInfo={flow:true,total};log(`本箱流拍。整箱真实价值 ${fmt(total)}`,'y');}
  else{const w=players[highBidder];w.cash-=currentHigh;w.cash+=total;const profit=total-currentHigh;
    lastWinnerInfo={who:w.name,bid:currentHigh,total,profit};
    log(`${w.name} 以 ${fmt(currentHigh)} 拿下！整箱 ${fmt(total)} → 利润 ${profit>=0?'+':''}${fmt(profit)}`,profit>=0?'g':'b');}
  let dead=[];
  alive().forEach(pi=>{const p=players[pi];p.cash-=taxFor(box);if(p.cash<=0){p.cash=0;p.alive=false;dead.push(p.name);}});
  if(dead.length)log(`💀 ${dead.join('、')} 现金归零，淘汰！`,'b');
  if(alive().length<=1||box>=BOXCAP){phase='gameover';render();return;}
  phase='settle'; render();
}

// ---- 渲染 ----
function render(){
  const turnPi = (phase==='bid'&&order&&turnPos<order.length)?order[turnPos]:-1;
  document.getElementById('players').innerHTML=players.map((p,i)=>{
    const turn=(turnPi===i)?' turn':''; const out=p.alive?'':' out';
    const bidding=(turnPi===i)?`<div class="bidding">⏳ 出价中…</div>`:'<div class="tag">&nbsp;</div>';
    return `<div class="pl${turn}${out}"><div class="nm">${p.name}${p.human?' 👤':' 🤖'}<span class="tag">${p.alive?'':'淘汰'}</span></div>
      <div class="cash">${fmt(p.cash)}</div>${bidding}</div>`;}).join('');
  const nb=currentHigh===0?OPENING:currentHigh+minRaise();
  document.getElementById('bar').innerHTML=
    `<span>第 <b>${box}</b>/${BOXCAP} 箱</span><span class="x">|</span>`+
    `<span>第 <b>${round}</b>/3 轮</span><span class="x">|</span>`+
    `<span>当前最高 <b>${currentHigh===0?'—':fmt(currentHigh)}</b>${highBidder!=null?'（'+players[highBidder].name+'）':''}</span><span class="x">|</span>`+
    `<span>最低下一口 <b>${fmt(nb)}</b></span><span class="x">|</span>`+
    `<span>本箱税 <b>${fmt(taxFor(box))}</b></span>`;
  const gd=document.getElementById('grid');
  gd.className='grid'+(targetMode==='peek'?' targeting':'');
  gd.innerHTML=container.map((it,idx)=>{
    const showFull = it.revealed || (phase!=='reveal' && it.knownBy.has(0));
    const opening = it.opening;
    const bg=showFull?COLHEX[it.ci]:'#0c131c';
    const txt=showFull&&it.ci<=1?'#10171f':'var(--txt)';
    const badges=(it.peeks||[]).map(pk=>`<span class="badge${pk.pi===0?' you':''}">${players[pk.pi].name[0]}${pk.round}</span>`).join('');
    let body;
    if(opening){ body=`<div class="sz">${it.cells}格</div><div class="spinner"></div>`; }
    else { body=`<div class="sz">${it.cells}格</div><div class="nm">${showFull?it.name:'？？？'}</div><div class="vl">${showFull?fmt(it.value):''}</div>`; }
    return `<div class="item${opening?' opening':''}${it.just?' justrevealed':''}" style="width:${44+it.cells*16}px;border-color:${showFull?COLHEX[it.ci]:'#44566a'};background:${bg};color:${txt}" onclick="pickTarget(${idx})">
      <div class="peek">${badges}</div>${body}</div>`;}).join('');
  renderAction(); renderPaybook();
}
function secsLeft(){return Math.max(0,Math.ceil((countdownEnd-Date.now())/1000));}
function renderAction(){
  const el=document.getElementById('action'); const me=players[0];
  if(phase==='gameover'){
    const rank=players.slice().sort((a,b)=>b.cash-a.cash);
    el.innerHTML=`<h3 style="margin:2px 0 8px">🏁 游戏结束 — 按净资产排名</h3>`+
      rank.map((p,i)=>`<div class="row"><b style="width:24px">${i+1}.</b><span style="width:90px">${p.name}</span><span class="y">${fmt(p.cash)}</span>${p.alive?'':'<span class="muted"> （中途淘汰）</span>'}</div>`).join('')+
      `<div class="row" style="margin-top:10px"><button onclick="newGame()">再来一局</button></div>`;return;}
  if(phase==='bid'){
    if(turnPos>=order.length){el.innerHTML=`<div class="hint">本轮结束…</div>`;return;}
    const pi=order[turnPos];
    if(pi!==0||!me.alive){el.innerHTML=`<div class="hint"><b>${players[pi].name}</b> 思考出价中… <span class="clock" id="clock">${secsLeft()}s</span></div>`;return;}
    const blind=container.reduce((a,it)=>a+(it.knownBy.has(0)?it.value:EV[it.si]),0);
    const need=currentHigh===0?OPENING:currentHigh+minRaise();
    const jump=Math.round(Math.min(me.cash,need*1.6)/100)*100;
    const peekRow = turnPeeked
      ? `<div class="row"><span class="muted">✔ 本回合已偷看</span></div>`
      : `<div class="row"><button class="alt" onclick="startPeek()">🔍 偷看一件（可选）</button>${targetMode==='peek'?'<span class="hint y">↑ 点击上方任意一件</span>':'<span class="muted">先看再出价，或直接出价</span>'}</div>`;
    el.innerHTML=`<div class="hint">轮到你 <span class="clock" id="clock">${secsLeft()}s</span>　盲估期望约 <b class="y">${fmt(blind)}</b>　当前最高 <b>${currentHigh===0?'—':fmt(currentHigh)}</b>，最低出价 <b>${fmt(need)}</b>，现金 <b class="y">${fmt(me.cash)}</b></div>
      ${peekRow}
      <div class="row"><input id="bidamt" value="${need}">
        <button onclick="humanRaise()">出价</button>
        <button class="alt" onclick="document.getElementById('bidamt').value=${need}">最小加价</button>
        <button class="alt" onclick="document.getElementById('bidamt').value=${jump}">跳价 ${fmt(jump)}</button>
        <button class="warn" onclick="humanPass()">过</button></div>`;return;}
  if(phase==='reveal'){
    const got=container.filter(it=>it.revealed).reduce((a,it)=>a+it.value,0);
    el.innerHTML=`<div class="hint">🔓 开箱中… 已揭晓累计 <b class="y">${fmt(got)}</b></div>`;return;}
  if(phase==='settle'){
    const w=lastWinnerInfo; let s = w.flow?`<b>流拍</b>，整箱价值 ${fmt(w.total)}`
      :`<b>${w.who}</b> 以 ${fmt(w.bid)} 拿下，整箱 ${fmt(w.total)}，利润 <span class="${w.profit>=0?'g':'b'}">${w.profit>=0?'+':''}${fmt(w.profit)}</span>`;
    el.innerHTML=`<div class="hint">本箱结算：${s}。全员已缴税 ${fmt(taxFor(box))}。</div><button onclick="startContainer()">下一箱 ▶</button>`;return;}
}
let pbDone=false;
function renderPaybook(){
  if(pbDone)return; pbDone=true;
  let h='<table><tr><th>颜色＼格</th><th>1格</th><th>2格</th><th>4格</th><th>6格</th></tr>';
  for(let c=0;c<5;c++){h+=`<tr><td style="color:${COLHEX[c]};font-weight:700">${COLNAME[c]}</td>`+
    [0,1,2,3].map(si=>`<td>${fmt(VAL[si][c])}<br><span class="muted">${(PROB[si][c]*100).toFixed(1)}%</span></td>`).join('')+'</tr>';}
  h+=`<tr><td class="muted">单格EV</td>`+[0,1,2,3].map(si=>`<td class="y">${fmt(EV[si])}</td>`).join('')+'</tr></table>';
  document.getElementById('paybook').innerHTML=h;
}
function log(t,cls){const l=document.getElementById('log');const d=document.createElement('div');if(cls)d.className=cls;d.innerHTML=t;l.appendChild(d);l.scrollTop=l.scrollHeight;}

// ---- 新手引导 ----
const OB=[
 {t:'🎯 你在玩什么',b:`你和另外 3 人竞拍一个个<b>神秘集装箱</b>，每箱装着 9–13 件收藏品。<br><br>
   拍前你<b>只看得到每件的大小</b>（占几格），<span class="em">看不到颜色和价值</span>。<br><br>
   目标：<b>猜整箱到底值多少钱</b>，用划算的价格把它拍下来。<br>
   <b>利润 = 整箱真实价值 − 你的出价</b>。买得比真实价值便宜就赚，反之就亏。<br><br>
   现金归零就被淘汰，活到最后 / 净资产最高者获胜。`},
 {t:'💎 怎么估值 & 偷看',b:`每件价值 = <b>颜色（品质，隐藏）× 大小（可见）</b>。<br>
   颜色越稀有越值钱：<b>白 < 蓝 < 紫 < 橙 < 红</b>。<br><br>
   底部的 <b>paybook</b> 公开了每种大小可能是哪些颜色、各自概率，帮你算期望。<br><br>
   招牌彩蛋：<span class="em">1 格的红色「非洲之心」是全场最贵（12 万）</span>——最小的格子，可能藏着最大的宝。<br><br>
   每轮你可<b>偷看 1 件</b>的真面目；别人能看到你<b>看了哪一件</b>（但不知道结果），你之后的出价就是信号——可真抢，也可诈唬。`},
 {t:'🔨 竞价 & 生存',b:`每箱拍 <b>3 轮</b>，价格只升不降。轮到你时：<b>先（可选）偷看，再出价或过</b>，然后轮到下一人。<br><br>
   第 1 轮投骰定序；之后由<b>上一轮最高价者决定顺序</b>（可把自己排到最后收尾，看完别人再补刀）。<br><br>
   起拍 1,000，最小加价 5%，也可一次<b>跳很高</b>吓退对手。<br><br>
   每箱结束<b>全员缴税，税越来越高</b> → 光囤钱不赢箱迟早破产。<br><br>
   <b>祝你捡漏发财！</b>`},
];
let obi=0;
function showOnboard(){obi=0;document.getElementById('onboard').classList.remove('hidden');renderOb();}
function renderOb(){const c=OB[obi];
  document.getElementById('ob-step').textContent=`新手引导　${obi+1} / ${OB.length}`;
  document.getElementById('ob-title').textContent=c.t;
  document.getElementById('ob-body').innerHTML=c.b;
  document.getElementById('ob-dots').innerHTML=OB.map((_,i)=>`<span class="ob-dot${i===obi?' on':''}"></span>`).join('');
  document.getElementById('ob-prev').classList.toggle('hidden',obi===0);
  document.getElementById('ob-next').textContent=obi===OB.length-1?'开始游戏 ▶':'下一步';}
function obNext(){if(obi<OB.length-1){obi++;renderOb();}else obClose();}
function obPrev(){if(obi>0){obi--;renderOb();}}
function obClose(){document.getElementById('onboard').classList.add('hidden');}

newGame();
showOnboard();
</script>
